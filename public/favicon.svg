<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <style>
    .bg { fill: #ffffff; }
    .frame { stroke: #2f6bff; }
    .inner { fill: #2f6bff; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0c0c0d; }
      .frame { stroke: #ffd21e; }
      .inner { fill: #ffd21e; }
    }
  </style>
  <rect class="bg frame" x="3" y="3" width="94" height="94" rx="16" stroke-width="6"/>
  <rect class="inner" x="30" y="30" width="40" height="40" rx="6"/>
</svg>
